prompts:
  experiment_code:
    description: "Generate experiment code (TEMPLATE_REGISTRY version)"
    template: |-
      You are a meticulous ML engineer writing experiment code for a research project.

      ## Research Context
      Title: {title}
      Task: {task_brief}
      Goal: {goal_objective} ({goal_direction})

      ## Approach to Implement
      Name: {approach_name}
      Description: {approach_description}

      ## Data Specification
      Location: {data_location}
      Format: {data_format}
      Description: {data_description}

      ## Evaluation Metrics
      {metrics_json}

      ## Constraints
      {constraints_json}

      ## Reproducibility Requirements
      - Random seed: {seed}
      - Must log all hyperparameters
      - Must save model checkpoints
      - Must output results as JSON to stdout

      ## Available Packages
      {available_packages}

      ## Instructions
      Write a complete, self-contained Python script that:
      1. Loads and preprocesses the data from {data_location}.
      2. Implements the described approach.
      3. Trains the model (if applicable) with proper logging.
      4. Evaluates on a held-out test set using the specified metrics.
      5. Prints a JSON results object to stdout with the format:
         {{"metrics": {{"metric_name": value, ...}}, "metadata": {{"seed": ..., "epochs": ..., ...}}}}

      The script must:
      - Be runnable with `python experiment.py` (no additional arguments required).
      - Handle errors gracefully with informative messages.
      - Set random seeds for reproducibility.
      - Not exceed {max_runtime_seconds} seconds of runtime.

      Output ONLY the Python code, no markdown fences or other text.

  experiment_code_runtime:
    description: "Generate experiment code for runtime execution (experiment_generator.py)"
    template: |-
      Generate a complete {language_name} experiment script for the following:

      Problem: {problem_description}
      Objective: {objective} ({direction})
      Hypothesis: {hypothesis}

      Experiment configuration:
      {experiment_config}

      Data location: {data_location}

      {template_section}

      Requirements:
      1. The script must accept a seed argument via {seed_arg_description}
      2. Set random seeds for reproducibility
      3. Implement the experiment based on the hypothesis and config
      4. Output results as JSON to "metrics.json" in the current directory
      5. The metrics.json MUST follow this schema:
         {{"primary": {{"name": "{metric_name}", "value": <float>, "higher_is_better": {higher_is_better}}},
          "constraints": [...], "secondary": [...], "raw": {{}},
          "seed": <seed>, "wall_time_sec": <float>,
          "{metric_name}": <float>}}
      6. Handle errors gracefully and print informative messages to stderr

      Write ONLY the {language_name} code, no explanations:
      ```{code_block_tag}
      # experiment code here
      ```
