prompts:
  experiment_code:
    description: Generate experiment code (TEMPLATE_REGISTRY version)
    template: "You are a meticulous ML engineer writing experiment code for a research\
      \ project.\n\n## Research Context\nTitle: {title}\nTask: {task_brief}\nGoal:\
      \ {goal_objective} ({goal_direction})\n\n## Approach to Implement\nName: {approach_name}\n\
      Description: {approach_description}\n\n## Data Specification\nLocation: {data_location}\n\
      Format: {data_format}\nDescription: {data_description}\n\n## Evaluation Metrics\n\
      {metrics_json}\n\n## Constraints\n{constraints_json}\n\n## Reproducibility Requirements\n\
      - Random seed: {seed}\n- Must log all hyperparameters\n- Must save model checkpoints\n\
      - Must output results as JSON to stdout\n\n## Available Packages\n{available_packages}\n\
      \n## Instructions\nWrite a complete, self-contained Python script that:\n1.\
      \ Loads and preprocesses the data from {data_location}.\n2. Implements the described\
      \ approach.\n3. Trains the model (if applicable) with proper logging.\n4. Evaluates\
      \ on a held-out test set using the specified metrics.\n5. Prints a JSON results\
      \ object to stdout with the format:\n   {{\"metrics\": {{\"metric_name\": value,\
      \ ...}}, \"metadata\": {{\"seed\": ..., \"epochs\": ..., ...}}}}\n\nThe script\
      \ must:\n- Be runnable with `python experiment.py` (no additional arguments\
      \ required).\n- Handle errors gracefully with informative messages.\n- Set random\
      \ seeds for reproducibility.\n- Not exceed {max_runtime_seconds} seconds of\
      \ runtime.\n\nOutput ONLY the Python code, no markdown fences or other text."
  experiment_code_runtime:
    description: Generate experiment code for runtime execution (experiment_generator.py)
    template: "You are a research engineer. Generate a multi-file experiment for the\
      \ task below.\n\nProblem: {problem_description}\nObjective: {objective} ({direction})\n\
      Hypothesis: {hypothesis}\n\nConfiguration:\n{experiment_config}\n\nData source:\
      \ {data_location}\n\n{notes_section}{template_section}\n\n## Output Format\n\
      \nOutput ONLY a JSON object inside a ```json block:\n```json\n{{\"entry_point\"\
      : \"<main_script>\", \"files\": [{{\"path\": \"<filename>\", \"content\": \"\
      <full content>\"}}, ...]}}\n```\n\nThe entry_point must accept `--seed {seed_arg_description}`\
      \ and write `metrics.json`.\nGenerate as many files as needed for a complete,\
      \ runnable experiment.\n\n## metrics.json format\n{{\"primary\": {{\"name\"\
      : \"{metric_name}\", \"value\": <float>, \"higher_is_better\": {higher_is_better}}},\n\
      \ \"constraints\": [...], \"secondary\": [], \"raw\": {{}},\n \"seed\": <int>,\
      \ \"wall_time_sec\": <float>, \"{metric_name}\": <float>}}\n\nOutput ONLY the\
      \ JSON block. No explanations.\n"
